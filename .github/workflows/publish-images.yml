name: Publish images

# Builds the web + worker images and pushes them to GitHub Container Registry
# (GHCR) so the NAS can pull pre-built images instead of compiling them.
#
# Runs automatically on every push to main (rebuilds :latest), on version tags
# (also publishes :X.Y.Z), and on manual dispatch. After a push finishes here,
# deploy on the NAS with Dockge → Update → Restart (pulls the new :latest).
#
# Doc-only changes are skipped (paths-ignore) to save Actions minutes; trigger a
# manual run from Actions → "Publish images" if you ever need to force a rebuild.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".claude/**"
  workflow_dispatch:

# A newer push supersedes an in-flight build instead of queueing another.
concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            dockerfile: docker/Dockerfile.web
          - name: worker
            dockerfile: docker/Dockerfile.worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/photography-platform-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Lean worker (no Chromium). To bake Remotion video support, build the
          # worker locally with --build-arg INSTALL_REMOTION_DEPS=true instead.
          cache-from: type=gha
          cache-to: type=gha,mode=max
