# Photography Platform — application stack.
# Nginx Proxy Manager + Cloudflare Tunnel are EXTERNAL to this file (see
# docs/DEPLOYMENT.md). Only `web` is meant to be proxied to.
#
# Run from the repo root:  docker compose -f docker/compose.yaml --env-file .env up
name: photography-platform

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-photog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-photog}
      POSTGRES_DB: ${POSTGRES_DB:-photography}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-photog} -d ${POSTGRES_DB:-photography}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # S3-compatible object storage (Apache-2.0). All-in-one node: master +
  # volume + filer + S3 gateway in one process. S3 API on :8333, file browser
  # (filer) on :8888, master UI on :9333. Identities/creds in seaweedfs/s3.json.
  seaweedfs:
    # Pinned (not :latest) so `docker compose pull` can't swap in a newer image
    # that breaks the stack unattended. This is the version most installs are
    # already running; bump it deliberately when you mean to.
    image: chrislusf/seaweedfs:4.34
    # Run as root: the data volume + mounted s3.json are root-owned (created by the
    # original root-running image). Newer SeaweedFS images default to a non-root
    # user that then can't read s3.json or write /data — so we force root here.
    user: "0:0"
    restart: unless-stopped
    command: "server -dir=/data -s3 -s3.config=/etc/seaweedfs/s3.json -s3.port=8333 -ip=seaweedfs -master.volumeSizeLimitMB=2048 -volume.max=0"
    volumes:
      - seaweeddata:/data
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    # No host ports published by default — the app and worker reach SeaweedFS
    # over the internal Docker network (hostname `seaweedfs`), so it stays
    # invisible from the host. Storage usage is visible in the admin dashboard
    # instead (Admin Dashboard → "Storage used" card).
    #
    # ── DEBUG: expose the SeaweedFS UIs on the host ──────────────────────────
    # Uncomment the block below (and `docker compose up -d seaweedfs`) to reach:
    #   http://localhost:8333  S3 API        http://localhost:8888  file browser
    #   http://localhost:9333  master/cluster status UI
    # Re-comment when done so nothing is exposed on the NAS host.
    # ports:
    #   - "8333:8333" # S3 API
    #   - "8888:8888" # filer / file browser
    #   - "9333:9333" # master UI
    healthcheck:
      # Probe the master (returns 200, no auth). -ip=seaweedfs binds to the
      # service interface, so use the hostname not localhost. The S3 gateway
      # comes up shortly after; the bucket-init below waits for it explicitly.
      test: ["CMD-SHELL", "wget -q -O - http://seaweedfs:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
    networks: [internal]

  # Ensures the media bucket exists, then idles as a healthy sidecar (so it shows
  # "running" in stack UIs like Dockge rather than exited). web/worker wait on its
  # health, not its exit — same guarantee, no exited container.
  seaweedfs-init:
    # Pinned (not :latest) so a pull can't drift this sidecar mid-deploy.
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: unless-stopped
    depends_on:
      seaweedfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set sw http://seaweedfs:8333 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin} 2>/dev/null; do
        echo 'waiting for s3 gateway...'; sleep 2;
      done;
      mc mb --ignore-existing sw/${S3_BUCKET:-photography-media} && echo 'bucket ready';
      touch /tmp/ready;
      tail -f /dev/null
      "
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks: [internal]

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    # All app config comes from ../.env (DB, Redis, S3, auth, email, and
    # SETTINGS_ENCRYPTION_KEY for the admin Settings tab). See .env.example.
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      seaweedfs-init:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [internal]

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    # Same env as web — the worker also needs SETTINGS_ENCRYPTION_KEY to decrypt
    # the SMTP password when sending queued email.
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      seaweedfs-init:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9091/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [internal]

volumes:
  pgdata:
  redisdata:
  seaweeddata:

networks:
  internal:
    driver: bridge
