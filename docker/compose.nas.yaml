# Pre-merged, single-file production stack for Synology Container Manager
# (Projects UI) or any "one compose file" host. Equivalent to:
#   compose.yaml + compose.prod.yaml + compose.ghcr.yaml
# It PULLS pre-built images from GHCR (no building on the NAS).
#
# ── Project folder layout (put these together) ───────────────────────────────
#   compose.nas.yaml        ← this file
#   .env                    ← your filled-in config (copy from .env.example)
#   seaweedfs/s3.json       ← S3 identities (copy from docker/seaweedfs/s3.json,
#                             keys must match S3_ACCESS_KEY_ID/SECRET in .env)
#
# ── Before first run ─────────────────────────────────────────────────────────
#   • Merge PR that adds the publish workflow, then make the two GHCR packages
#     Public (GitHub → Packages → each → Package settings → Public). Otherwise
#     run `docker login ghcr.io` on the NAS first.
#   • In .env set at minimum: NODE_ENV=production, a strong BETTER_AUTH_SECRET
#     (openssl rand -base64 48), SETTINGS_ENCRYPTION_KEY (openssl rand -hex 32),
#     POSTGRES_* , S3_ACCESS_KEY_ID/SECRET, APP_BASE_URL/BETTER_AUTH_URL.
#   • Optionally set IMAGE_TAG to pin a build (default: latest).
#
# The worker applies DB migrations automatically on boot. Seed the owner once:
#   docker compose -f compose.nas.yaml run --rm worker npm run db:seed
#
# NOTE: the GHCR worker image is the lean build (no Chromium / Remotion video).
name: photography-platform

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-photog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-photog}
      POSTGRES_DB: ${POSTGRES_DB:-photography}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-photog} -d ${POSTGRES_DB:-photography}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]
    logging: { driver: json-file, options: { max-size: 10m, max-file: "3" } }

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]
    logging: { driver: json-file, options: { max-size: 10m, max-file: "3" } }

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: "server -dir=/data -s3 -s3.config=/etc/seaweedfs/s3.json -s3.port=8333 -ip=seaweedfs -master.volumeSizeLimitMB=2048 -volume.max=0"
    volumes:
      - seaweeddata:/data
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://seaweedfs:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
    networks: [internal]
    logging: { driver: json-file, options: { max-size: 10m, max-file: "3" } }

  # Ensures the media bucket exists, then idles as a healthy sidecar (shows
  # "running" in Container Manager/Dockge, not exited). web/worker wait on its
  # health, not its exit.
  seaweedfs-init:
    image: minio/mc:latest
    restart: unless-stopped
    depends_on:
      seaweedfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set sw http://seaweedfs:8333 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin} 2>/dev/null; do
        echo 'waiting for s3 gateway...'; sleep 2;
      done;
      mc mb --ignore-existing sw/${S3_BUCKET:-photography-media} && echo 'bucket ready';
      touch /tmp/ready;
      tail -f /dev/null
      "
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks: [internal]

  web:
    image: ghcr.io/t0n003c/photography-platform-web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    env_file: .env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      seaweedfs: { condition: service_healthy }
      seaweedfs-init: { condition: service_healthy }
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [internal]
    deploy:
      resources:
        limits: { cpus: "1.5", memory: 1024M }
    logging: { driver: json-file, options: { max-size: 10m, max-file: "3" } }

  worker:
    image: ghcr.io/t0n003c/photography-platform-worker:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    env_file: .env
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      seaweedfs: { condition: service_healthy }
      seaweedfs-init: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9091/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [internal]
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 2048M }
    logging: { driver: json-file, options: { max-size: 10m, max-file: "3" } }

volumes:
  pgdata:
  redisdata:
  seaweeddata:

networks:
  internal:
    driver: bridge
